<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aneka Banyu</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1923; --surface: #1a2738; --surface2: #223044;
    --accent: #00d4aa; --accent2: #ff6b35; --accent3: #ffd166;
    --text: #e8f4f0; --muted: #7a9bb5; --danger: #ff4757;
    --card-radius: 18px; --btn-radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; padding-bottom: 80px; }

  /* PIN SCREEN */
  .pin-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 24px; max-width: 430px; margin: 0 auto; }
  .pin-screen.hidden { display: none; }
  .pin-logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
  .pin-logo span { color: var(--accent3); }
  .pin-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 32px; font-weight: 600; }
  .pin-title { font-size: 16px; font-weight: 800; margin-bottom: 20px; text-align: center; }
  .pin-dots { display: flex; gap: 14px; margin-bottom: 32px; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--muted); background: transparent; transition: all 0.2s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--danger); border-color: var(--danger); }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
  .pin-key { background: var(--surface); border: none; border-radius: 16px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; padding: 18px; cursor: pointer; transition: transform 0.1s, background 0.15s; }
  .pin-key:active { transform: scale(0.92); background: var(--surface2); }
  .pin-key.del { font-size: 18px; color: var(--muted); }
  .pin-key.empty { background: transparent; cursor: default; }
  .pin-error-msg { color: var(--danger); font-size: 13px; font-weight: 700; margin-top: -20px; margin-bottom: 16px; min-height: 18px; }
  .pin-change-link { margin-top: 20px; color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: underline; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); padding: 20px 20px 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,212,170,0.15); }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .app-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
  .app-title span { color: var(--accent3); }
  .date-badge { background: rgba(0,212,170,0.12); color: var(--accent); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(0,212,170,0.25); }
  .header-stats { display: flex; gap: 10px; margin-top: 12px; }
  .hstat { flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,0.06); }
  .hstat-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .hstat-val { font-size: 15px; font-weight: 900; margin-top: 2px; }
  .hstat-val.green { color: var(--accent); } .hstat-val.orange { color: var(--accent2); } .hstat-val.yellow { color: var(--accent3); }

  /* NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #111d2b; border-top: 1px solid rgba(0,212,170,0.15); display: flex; z-index: 200; }
  .nav-btn { flex: 1; background: none; border: none; color: var(--muted); padding: 12px 0 10px; font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.2s; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; margin-top: 4px; }

  /* PRODUCT CARDS (jual) */
  .product-grid { display: flex; flex-direction: column; gap: 10px; }
  .product-card { background: var(--surface); border-radius: var(--card-radius); padding: 14px 16px; border: 1.5px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 14px; transition: border-color 0.2s, transform 0.1s; cursor: pointer; }
  .product-card:active { transform: scale(0.98); }
  .prod-icon { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .prod-info { flex: 1; min-width: 0; }
  .prod-name { font-weight: 800; font-size: 14px; }
  .prod-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .prod-price { font-weight: 900; font-size: 13px; color: var(--accent3); margin-top: 2px; }
  .prod-stok-badge { background: rgba(255,255,255,0.07); border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
  .prod-stok-badge.low { color: var(--danger); background: rgba(255,71,87,0.12); }

  /* TOKO SELECTOR */
  .toko-selector-bar { background: var(--surface); border-radius: var(--card-radius); padding: 12px 14px; margin-bottom: 14px; border: 1.5px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .toko-sel-icon { font-size: 22px; }
  .toko-sel-info { flex: 1; }
  .toko-sel-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .toko-sel-name { font-weight: 800; font-size: 15px; margin-top: 1px; }
  .toko-sel-name.placeholder { color: var(--muted); font-weight: 600; font-size: 13px; }
  .toko-sel-chevron { color: var(--muted); } .toko-sel-chevron svg { width: 18px; height: 18px; }

  /* MODALS */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 500; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: #1a2738; width: 100%; max-width: 430px; border-radius: 24px 24px 0 0; padding: 20px; animation: slideUp 0.25s ease; max-height: 92vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 14px; }

  /* TOKO PICKER */
  .toko-search-input { width: 100%; background: var(--bg); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 12px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600; padding: 12px 14px; margin-bottom: 12px; }
  .toko-search-input:focus { outline: none; border-color: var(--accent); }
  .toko-pick-list { display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; }
  .toko-pick-item { background: var(--surface2); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1.5px solid transparent; transition: border-color 0.15s; }
  .toko-pick-item.selected { border-color: var(--accent); background: rgba(0,212,170,0.07); }
  .toko-pick-icon { font-size: 20px; }
  .toko-pick-info { flex: 1; }
  .toko-pick-name { font-weight: 800; font-size: 14px; }
  .toko-pick-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .toko-pick-manual { background: rgba(0,212,170,0.08); border: 1.5px dashed rgba(0,212,170,0.3); border-radius: 12px; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-top: 4px; }
  .toko-pick-manual span { font-weight: 700; color: var(--accent); font-size: 14px; }

  /* TRX MODAL */
  .modal-product-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 2px; }
  .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .toko-chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,212,170,0.12); border: 1px solid rgba(0,212,170,0.25); border-radius: 20px; padding: 5px 12px; margin-bottom: 14px; cursor: pointer; }
  .toko-chip-name { font-size: 12px; font-weight: 800; color: var(--accent); }
  .toko-chip-change { font-size: 10px; color: var(--muted); }
  .satuan-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .satuan-tab { flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.1); background: none; color: var(--muted); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.15s; line-height: 1.4; }
  .satuan-tab.active { background: var(--accent); color: #0f1923; border-color: var(--accent); }
  .qty-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 14px; }
  .qty-btn { width: 52px; height: 52px; border-radius: 16px; border: none; font-size: 28px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
  .qty-btn:active { transform: scale(0.9); }
  .qty-btn.minus { background: rgba(255,71,87,0.2); color: var(--danger); }
  .qty-btn.plus { background: rgba(0,212,170,0.2); color: var(--accent); }
  .qty-display { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; width: 80px; text-align: center; }
  .harga-row { background: var(--surface2); border-radius: 14px; padding: 12px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .harga-row-label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .harga-input-wrap { flex: 1; display: flex; align-items: center; gap: 6px; }
  .harga-prefix { color: var(--muted); font-size: 13px; font-weight: 700; }
  .harga-input { flex: 1; background: var(--bg); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; padding: 8px 10px; text-align: right; -moz-appearance: textfield; min-width: 0; }
  .harga-input::-webkit-inner-spin-button, .harga-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .harga-input:focus { outline: none; border-color: var(--accent3); }
  .harga-source { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 700; flex-shrink: 0; }
  .harga-source.toko { background: rgba(0,212,170,0.15); color: var(--accent); }
  .harga-source.default { background: rgba(255,209,102,0.15); color: var(--accent3); }
  .harga-source.manual { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .modal-total { background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.2); border-radius: 14px; padding: 12px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .modal-total-label { color: var(--muted); font-size: 13px; font-weight: 700; }
  .modal-total-val { font-size: 20px; font-weight: 900; color: var(--accent3); }
  .btn-confirm { width: 100%; padding: 16px; background: var(--accent); color: #0f1923; border: none; border-radius: var(--btn-radius); font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900; cursor: pointer; }
  .btn-confirm:active { opacity: 0.9; }
  .btn-cancel { width: 100%; padding: 12px; background: none; color: var(--muted); border: none; border-radius: var(--btn-radius); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 6px; }

  /* STOK */
  .stok-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .stok-tab { flex: 1; padding: 10px; background: var(--surface); border: 1.5px solid rgba(255,255,255,0.07); border-radius: 10px; color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.15s; }
  .stok-tab.active { background: rgba(0,212,170,0.12); color: var(--accent); border-color: rgba(0,212,170,0.3); }
  .stok-card { background: var(--surface); border-radius: var(--card-radius); padding: 16px; margin-bottom: 10px; border: 1.5px solid rgba(255,255,255,0.05); }
  .stok-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .stok-prod-name { font-weight: 800; font-size: 15px; }
  .stok-prod-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .stok-input-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .stok-row { display: flex; gap: 10px; }
  .stok-col { flex: 1; }
  .stok-input { width: 100%; background: var(--bg); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800; padding: 10px 12px; text-align: center; -moz-appearance: textfield; }
  .stok-input::-webkit-inner-spin-button, .stok-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .stok-input:focus { outline: none; border-color: var(--accent); }
  .stok-info-row { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
  .stok-info-item { text-align: center; }
  .stok-info-label { font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
  .stok-info-val { font-size: 14px; font-weight: 900; margin-top: 2px; }
  .btn-save-stok { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), #00b894); color: #0f1923; border: none; border-radius: var(--btn-radius); font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 6px; }

  /* REKAP */
  .rekap-date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; background: var(--surface); border-radius: var(--card-radius); padding: 10px 14px; }
  .date-nav-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; display: flex; align-items: center; transition: color 0.2s; }
  .date-nav-btn:not(:disabled) { color: var(--text); }
  .date-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .date-nav-btn svg { width: 20px; height: 20px; }
  .date-display { flex: 1; text-align: center; font-weight: 800; font-size: 14px; }
  .rekap-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .rekap-card { background: var(--surface); border-radius: var(--card-radius); padding: 14px; border: 1.5px solid rgba(255,255,255,0.05); }
  .rekap-card.full { grid-column: 1 / -1; }
  .rekap-card-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .rekap-card-val { font-size: 18px; font-weight: 900; }
  .rekap-card-val.green { color: var(--accent); } .rekap-card-val.red { color: var(--danger); } .rekap-card-val.yellow { color: var(--accent3); } .rekap-card-val.orange { color: var(--accent2); }
  .trx-list { display: flex; flex-direction: column; gap: 8px; }
  .trx-item { background: var(--surface); border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.04); }
  .trx-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
  .trx-info { flex: 1; min-width: 0; }
  .trx-name { font-weight: 800; font-size: 13px; }
  .trx-toko { font-size: 11px; color: var(--accent); font-weight: 700; }
  .trx-meta { font-size: 11px; color: var(--muted); }
  .trx-right { text-align: right; flex-shrink: 0; }
  .trx-total { font-weight: 900; font-size: 14px; color: var(--accent3); }
  .trx-time { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .trx-delete { background: rgba(255,71,87,0.12); border: none; color: var(--danger); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state-text { font-weight: 700; font-size: 15px; }
  .empty-state-sub { font-size: 13px; margin-top: 4px; opacity: 0.7; }

  /* TOKO MANAGE */
  .toko-card { background: var(--surface); border-radius: var(--card-radius); padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid rgba(255,255,255,0.05); }
  .toko-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .toko-card-icon { font-size: 24px; }
  .toko-card-name-input { flex: 1; background: var(--bg); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; padding: 8px 12px; }
  .toko-card-name-input:focus { outline: none; border-color: var(--accent); }
  .toko-card-delete { background: rgba(255,71,87,0.12); border: none; color: var(--danger); width: 36px; height: 36px; border-radius: 9px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .toko-harga-section-label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .toko-prod-harga-block { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .toko-prod-harga-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .toko-prod-label { font-size: 12px; font-weight: 800; color: var(--accent); margin-bottom: 7px; }
  .toko-harga-row { display: flex; gap: 10px; }
  .toko-harga-col { flex: 1; }
  .toko-harga-label { font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .toko-harga-input { width: 100%; background: var(--bg); border: 1.5px solid rgba(255,255,255,0.07); border-radius: 9px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; padding: 8px 10px; text-align: right; -moz-appearance: textfield; }
  .toko-harga-input::-webkit-inner-spin-button, .toko-harga-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .toko-harga-input:focus { outline: none; border-color: var(--accent3); }

  /* PRODUK ACCORDION */
  .prod-search-wrap { position: relative; margin-bottom: 12px; }
  .prod-search { width: 100%; background: var(--surface); border: 1.5px solid rgba(255,255,255,0.07); border-radius: 12px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600; padding: 11px 14px 11px 38px; }
  .prod-search:focus { outline: none; border-color: var(--accent); }
  .prod-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
  .prod-category { margin-bottom: 16px; }
  .prod-category-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; padding-left: 4px; }
  .prod-accordion-item { background: var(--surface); border-radius: var(--card-radius); margin-bottom: 8px; border: 1.5px solid rgba(255,255,255,0.05); overflow: hidden; transition: border-color 0.2s; }
  .prod-accordion-item.open { border-color: rgba(0,212,170,0.3); }
  .prod-accordion-header { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; }
  .prod-accordion-header:active { background: rgba(255,255,255,0.03); }
  .prod-accordion-icon { font-size: 20px; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .prod-accordion-info { flex: 1; }
  .prod-accordion-name { font-weight: 800; font-size: 14px; }
  .prod-accordion-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .prod-accordion-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .prod-accordion-item.open .prod-accordion-chevron { transform: rotate(180deg); }
  .prod-accordion-body { display: none; padding: 0 16px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
  .prod-accordion-item.open .prod-accordion-body { display: block; }
  .prod-field-row { display: flex; gap: 10px; margin-top: 12px; }
  .prod-field { flex: 1; }

<script>
// PIN globals - diakses dari onclick HTML dan dari module
var pinInput = '';
var pinFirst = '';
var savedPin = '';
var pinMode  = 'login';
var pinUnlocked = false;

function pinKey(k) {
  if (pinInput.length >= 4) return;
  pinInput += k;
  updatePinDots();
  if (pinInput.length === 4) setTimeout(processPinInput, 150);
}
function pinDel() {
  pinInput = pinInput.slice(0,-1);
  updatePinDots();
  document.getElementById('pinError').textContent = '';
}
function updatePinDots(isError) {
  for(var i=0;i<4;i++) {
    var dot = document.getElementById('dot'+i);
    dot.className = 'pin-dot';
    if (isError) dot.classList.add('error');
    else if (i < pinInput.length) dot.classList.add('filled');
  }
}
function processPinInput() {
  if (pinMode === 'login') {
    if (pinInput === savedPin) {
      sessionStorage.setItem('ab_unlocked','1');
      document.getElementById('pinScreen').classList.add('hidden');
      pinUnlocked = true;
      if(typeof updateHeader==='function') updateHeader();
      if(typeof renderJual==='function') renderJual();
    } else {
      document.getElementById('pinError').textContent = 'PIN salah, coba lagi';
      updatePinDots(true);
      setTimeout(function(){ pinInput=''; updatePinDots(); document.getElementById('pinError').textContent=''; }, 800);
    }
  } else if (pinMode === 'setup') {
    pinFirst = pinInput; pinInput = '';
    pinMode = 'setup2';
    document.getElementById('pinTitle').textContent = 'Konfirmasi PIN';
    document.getElementById('pinSubtitle').textContent = 'Masukkan PIN yang sama sekali lagi';
    updatePinDots();
  } else if (pinMode === 'setup2') {
    if (pinInput === pinFirst) {
      savedPin = pinInput;
      pinFirst = ''; pinInput = '';
      if(typeof fbSavePin==='function') fbSavePin(savedPin);
      sessionStorage.setItem('ab_unlocked','1');
      document.getElementById('pinScreen').classList.add('hidden');
      pinUnlocked = true;
      if(typeof showToast==='function') showToast('✓ PIN berhasil dibuat!');
      if(typeof updateHeader==='function') updateHeader();
      if(typeof renderJual==='function') renderJual();
    } else {
      document.getElementById('pinError').textContent = 'PIN tidak cocok, ulangi dari awal';
      updatePinDots(true);
      setTimeout(function(){ pinInput=''; pinFirst=''; pinMode='setup'; document.getElementById('pinTitle').textContent='Buat PIN baru (4 digit)'; updatePinDots(); document.getElementById('pinError').textContent=''; }, 1000);
    }
  } else if (pinMode === 'change') {
    if (pinInput === savedPin) {
      pinInput=''; pinMode='change2'; pinFirst='';
      document.getElementById('pinTitle').textContent='Masukkan PIN baru';
      document.getElementById('pinSubtitle').textContent='Buat PIN baru kamu';
      updatePinDots();
    } else {
      document.getElementById('pinError').textContent='PIN lama salah';
      updatePinDots(true);
      setTimeout(function(){ pinInput=''; updatePinDots(); document.getElementById('pinError').textContent=''; }, 800);
    }
  } else if (pinMode === 'change2') {
    if (!pinFirst) {
      pinFirst=pinInput; pinInput='';
      document.getElementById('pinTitle').textContent='Konfirmasi PIN baru';
      updatePinDots();
    } else {
      if (pinInput === pinFirst) {
        savedPin=pinInput;
        pinFirst=''; pinInput='';
        if(typeof fbSavePin==='function') fbSavePin(savedPin);
        sessionStorage.setItem('ab_unlocked','1');
        document.getElementById('pinScreen').classList.add('hidden');
        if(typeof showToast==='function') showToast('✓ PIN berhasil diubah!');
      } else {
        document.getElementById('pinError').textContent='PIN tidak cocok, ulangi';
        updatePinDots(true);
        setTimeout(function(){ pinInput=''; pinFirst=''; document.getElementById('pinTitle').textContent='Masukkan PIN baru'; updatePinDots(); document.getElementById('pinError').textContent=''; }, 1000);
      }
    }
  }
}
function startChangePin() {
  pinMode='change'; pinInput=''; pinFirst='';
  document.getElementById('pinTitle').textContent='Masukkan PIN lama';
  document.getElementById('pinSubtitle').textContent='Verifikasi PIN lama kamu dulu';
  document.getElementById('pinChangeLink').style.display='none';
  document.getElementById('pinScreen').classList.remove('hidden');
  updatePinDots();
}
function initPin() {
  if (sessionStorage.getItem('ab_unlocked') === '1' && savedPin) {
    document.getElementById('pinScreen').classList.add('hidden');
    pinUnlocked = true;
    if(typeof updateHeader==='function') updateHeader();
    if(typeof renderJual==='function') renderJual();
    return;
  }
  if (!savedPin) {
    pinMode = 'setup';
    document.getElementById('pinTitle').textContent = 'Buat PIN baru (4 digit)';
    document.getElementById('pinSubtitle').textContent = 'Selamat datang! Buat PIN untuk mengamankan aplikasi';
  } else {
    pinMode = 'login';
    document.getElementById('pinTitle').textContent = 'Masukkan PIN';
    document.getElementById('pinSubtitle').textContent = 'Masukkan PIN untuk melanjutkan';
    document.getElementById('pinChangeLink').style.display = 'block';
  }
  document.getElementById('pinScreen').classList.remove('hidden');
  pinInput = '';
  updatePinDots();
}
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_ubzJiDta4I4zgjaGTtJ0jhXPZhlrSmA",
  authDomain: "aneka-banyu.firebaseapp.com",
  projectId: "aneka-banyu",
  storageBucket: "aneka-banyu.firebasestorage.app",
  messagingSenderId: "391678609695",
  appId: "1:391678609695:web:6f012b497855d3e851482a"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── KONSTANTA ─────────────────────────────────────────────────────
const ICON_COLORS = ['icon-color-1','icon-color-2','icon-color-3','icon-color-4','icon-color-5'];
const defaultProducts = [
  { id:'prod_1', name:'Air Mineral Kecil', brand:'600ml', icon:'💧', iconColor:'icon-color-1', kategori:'Air Mineral', hargaBeli:2000, hargaJual:3000, satuanKarton:24, hargaKartonBeli:44000, hargaKartonJual:65000 },
  { id:'prod_2', name:'Air Mineral Tanggung', brand:'1500ml', icon:'💧', iconColor:'icon-color-2', kategori:'Air Mineral', hargaBeli:3500, hargaJual:5000, satuanKarton:12, hargaKartonBeli:38000, hargaKartonJual:55000 },
  { id:'prod_3', name:'Air Galon', brand:'19 Liter', icon:'🪣', iconColor:'icon-color-3', kategori:'Air Mineral', hargaBeli:15000, hargaJual:20000, satuanKarton:1, hargaKartonBeli:15000, hargaKartonJual:20000 },
  { id:'prod_4', name:'Minuman Teh/Juice', brand:'Kemasan', icon:'🧃', iconColor:'icon-color-4', kategori:'Minuman Lain', hargaBeli:3000, hargaJual:4500, satuanKarton:24, hargaKartonBeli:65000, hargaKartonJual:96000 },
];

// ── STATE ─────────────────────────────────────────────────────────
let products   = [];
let tokos      = [];
let stokHarian = {};
let stokGudang = {};
let transaksi  = {};

let selectedToko  = null;
let selectedProd  = null;
let currentQty    = 1;
let currentSatuan = 'satuan';
let hargaManual   = false;
let rekapDate     = todayKey();
let rekapTab      = 'trx';
let stokTab       = 'mobil';
let prodSearchQ   = '';
let jualSearchQ   = '';

// ── PIN STATE - dikelola di script non-module di atas ─────────────

// ── UTILS ─────────────────────────────────────────────────────────
function todayKey() { return new Date().toISOString().split('T')[0]; }
function formatDate(k) { const d=new Date(k+'T00:00:00'); return d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }
function formatRp(n) { if(n>=1000000) return 'Rp '+(n/1000000).toFixed(1)+'jt'; if(n>=1000) return 'Rp '+(n/1000).toFixed(0)+'rb'; return 'Rp '+n; }
function formatRpFull(n) { return 'Rp '+n.toLocaleString('id-ID'); }
function getDateTrx(k) { return transaksi[k]||[]; }
function calcStats(k) { let p=0,m=0; getDateTrx(k).forEach(t=>{p+=t.total;m+=t.totalBeli;}); return {pemasukan:p,modal:m,untung:p-m}; }
function getHargaToko(tid,pid,sat) { const t=tokos.find(t=>t.id===tid); if(!t) return null; return t.harga[pid+'_'+sat]||null; }

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg,isErr=false) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=isErr?'var(--danger)':'var(--accent)';
  t.style.color=isErr?'#fff':'#0f1923';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── FIREBASE ──────────────────────────────────────────────────────
async function fbSave(col, docId, data) {
  try { await setDoc(doc(db,col,docId), data); } catch(e) { showToast('⚠️ Gagal simpan, cek internet',true); }
}
async function fbLoad() {
  showToast('⏳ Memuat data...');
  try {
    const [prodDoc, tokoDoc, stokDoc, gudangDoc, pinDoc] = await Promise.all([
      getDoc(doc(db,'config','products')),
      getDoc(doc(db,'config','tokos')),
      getDoc(doc(db,'config','stok')),
      getDoc(doc(db,'config','stokGudang')),
      getDoc(doc(db,'config','pin')),
    ]);
    products   = prodDoc.exists()   ? prodDoc.data().list   : [...defaultProducts];
    tokos      = tokoDoc.exists()   ? tokoDoc.data().list   : [];
    stokHarian = stokDoc.exists()   ? stokDoc.data()        : {};
    stokGudang = gudangDoc.exists() ? gudangDoc.data()      : {};
    savedPin   = pinDoc.exists()    ? pinDoc.data().pin     : '';
    if (!prodDoc.exists()) await fbSave('config','products',{list:products});

    const trxSnap = await getDocs(collection(db,'transaksi'));
    transaksi = {};
    trxSnap.forEach(d=>{transaksi[d.id]=d.data().list||[];});

    // Init PIN
    initPin();
  } catch(e) {
    console.error(e);
    showToast('⚠️ Gagal koneksi Firebase',true);
  }
}

// ── PIN SYSTEM - fungsi ada di script non-module di atas ─────────
// fbSavePin dipanggil dari non-module script
function fbSavePin(pin) { fbSave('config','pin',{pin:pin}); }

// ── HEADER ────────────────────────────────────────────────────────
function updateHeader() {
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short'});
  const s=calcStats(todayKey());
  document.getElementById('statPemasukan').textContent=formatRp(s.pemasukan);
  document.getElementById('statModal').textContent=formatRp(s.modal);
  document.getElementById('statUntung').textContent=formatRp(s.untung);
}

// ── PAGE NAV ──────────────────────────────────────────────────────
window.showPage = function(name,btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='jual')   renderJual();
  if(name==='stok')   renderStok();

function getTerjual(prodId, dateKey) {

    .reduce((sum,t)=>sum+(t.satuan==='satuan'?t.qty:t.qty*p.satuanKarton),0);

      products.map(p=>`<div class="stok-card">

      </div>`).join('')+'<button class="btn-save-stok" style="background:linear-gradient(135deg,var(--accent3),#f0a500);color:#0f1923" onclick="saveStokGudang()">💾 Simpan Stok Gudang</button>';
  }

window.saveStokMobil=async function(){
  const today=todayKey();
  if(!stokHarian[today]) stokHarian[today]={};

  // Hitung pengambilan baru vs sebelumnya
  const prevStok = stokHarian[today] || {};
  let warningList = [];

  products.forEach(p=>{
    const inputVal = parseInt(document.getElementById('stokMobil_'+p.id).value)||0;
    const prevAmbil = prevStok[p.id] ? prevStok[p.id].awal : 0;
    const tambahan  = inputVal - prevAmbil; // selisih pengambilan hari ini
    const gudangSaat = stokGudang[p.id]||0;

    if (tambahan > 0) {
      // Ada penambahan pengambilan, kurangi gudang
      if (tambahan > gudangSaat) {
        warningList.push(`${p.name}: ambil ${tambahan} tapi gudang hanya ${gudangSaat}`);
      } else {
        stokGudang[p.id] = gudangSaat - tambahan;
      }
    } else if (tambahan < 0) {
      // Pengurangan pengambilan (koreksi), kembalikan ke gudang
      stokGudang[p.id] = gudangSaat + Math.abs(tambahan);
    }
    stokHarian[today][p.id] = { awal: inputVal };
  });

  if (warningList.length > 0) {
    alert('⚠️ Stok gudang tidak cukup untuk:\n' + warningList.join('\n') + '\n\nSilakan cek stok gudang terlebih dahulu.');
    return;
  }

  renderJual();
  renderStok(); // refresh tampilan stok gudang
  showToast('✓ Stok mobil tersimpan, gudang diperbarui!');
  await Promise.all([
    fbSave('config','stok',stokHarian),
    fbSave('config','stokGudang',stokGudang)
  ]);
}

window.saveStokGudang=async function(){
  products.forEach(p=>{stokGudang[p.id]=parseInt(document.getElementById('stokGudang_'+p.id).value)||0;});
  showToast('✓ Stok gudang tersimpan!');
  await fbSave('config','stokGudang',stokGudang);
}

function renderRekap(){

function renderRekapContent(){

    if(!trxs.length){el.innerHTML=emptyState();return;}
    el.innerHTML='<div class="trx-list">'+[...trxs].reverse().map(t=>`
      <div class="trx-item">
        <div class="trx-icon">${t.icon}</div>

        <div class="trx-right"><div class="trx-total">${formatRpFull(t.total)}</div><div class="trx-time">${t.time}</div></div>
        <button class="trx-delete" onclick="deleteTrx('${rekapDate}',${t.id})">✕</button>
      </div>`).join('')+'</div>';

    const bt={};

    if(!Object.keys(bt).length){el.innerHTML=emptyState();return;}
    el.innerHTML=Object.entries(bt).sort((a,b)=>b[1].total-a[1].total).map(([name,data])=>`

      </div>`).join('');
  }
}

            </div>
            <div class="prod-field-row">
              <div class="prod-field"><div class="prod-field-label">Keterangan</div><input class="prod-field-input" value="${p.brand}" oninput="setProdField('${p.id}','brand',this.value)"></div>
              <div class="prod-field"><div class="prod-field-label">Isi Karton</div><input class="prod-field-input" type="number" value="${p.satuanKarton}" oninput="setProdField('${p.id}','satuanKarton',this.value)"></div>
            </div>
            <div class="prod-field-row">
              <div class="prod-field"><div class="prod-field-label">Beli/btl</div><input class="prod-field-input" type="number" value="${p.hargaBeli}" oninput="setProdField('${p.id}','hargaBeli',this.value)"></div>
              <div class="prod-field"><div class="prod-field-label">Jual/btl (default)</div><input class="prod-field-input" type="number" value="${p.hargaJual}" oninput="setProdField('${p.id}','hargaJual',this.value)"></div>
            </div>
            <div class="prod-field-row">
              <div class="prod-field"><div class="prod-field-label">Beli/karton</div><input class="prod-field-input" type="number" value="${p.hargaKartonBeli}" oninput="setProdField('${p.id}','hargaKartonBeli',this.value)"></div>
              <div class="prod-field"><div class="prod-field-label">Jual/karton (default)</div><input class="prod-field-input" type="number" value="${p.hargaKartonJual}" oninput="setProdField('${p.id}','hargaKartonJual',this.value)"></div>
            </div>
            <button class="prod-delete-btn" onclick="deleteProd('${p.id}')">🗑 Hapus Produk Ini</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
  document.getElementById('manageProdList').innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">Produk tidak ditemukan</div></div>';
}
window.addNewProd=function(){
  const newProd={id:'prod_'+Date.now(),name:'Produk Baru',brand:'',icon:'📦',iconColor:ICON_COLORS[products.length%ICON_COLORS.length],kategori:'Lainnya',hargaBeli:0,hargaJual:0,satuanKarton:12,hargaKartonBeli:0,hargaKartonJual:0};
  products.push(newProd);
  renderManageProd();
  setTimeout(()=>{
    window.scrollTo(0,document.body.scrollHeight);
    // Auto-open accordion produk baru
    const el=document.getElementById('acc_'+newProd.id);
    if(el) el.classList.add('open');
  },100);
}
window.deleteProd=function(prodId){
  const p=products.find(p=>p.id===prodId);
  if(!p||!confirm('Hapus produk '+p.name+'?')) return;
  products=products.filter(p=>p.id!==prodId);
  renderManageProd();
}
window.saveProducts=async function(){await fbSave('config','products',{list:products});renderJual();showToast('✓ Produk tersimpan!');}

// ── INIT ──────────────────────────────────────────────────────────
document.getElementById('headerDate').textContent=new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short'});
fbLoad();
</script>
</body>
</html>
